<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Volpair — Slide 06 Product Mockups</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px; height: 1080px;
    background: #0A1520;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .slide {
    width: 1920px; height: 1080px;
    background: #0A1520;
    position: relative; overflow: hidden;
  }
  .glow-tl {
    position: absolute; bottom: -100px; left: 600px;
    width: 600px; height: 600px;
    background: radial-gradient(ellipse, rgba(0,212,200,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .glow-tr {
    position: absolute; top: -100px; right: 100px;
    width: 700px; height: 600px;
    background: radial-gradient(ellipse, rgba(124,58,237,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  /* Left text block */
  .left-text {
    position: absolute;
    left: 80px; top: 50%;
    transform: translateY(-50%);
    width: 360px;
  }
  .h-white {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: 64px;
    color: #fff; display: block; line-height: 1.0;
  }
  .h-gradient {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: 64px;
    background: linear-gradient(135deg, #00D4C8, #7C3AED);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    display: block; line-height: 1.0; margin-bottom: 20px;
  }
  .subtitle {
    font-family: 'Inter', sans-serif;
    font-size: 16px; color: #4A6080;
    margin-bottom: 28px;
    line-height: 1.5;
  }
  .stat-pills {
    display: flex; flex-direction: column; gap: 10px;
  }
  .stat-pill {
    display: inline-flex; align-items: center;
    padding: 8px 18px;
    border: 1px solid #1A2C42;
    border-radius: 100px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    color: #7A9CC0;
    letter-spacing: 0.05em;
    background: rgba(17,30,46,0.5);
    width: fit-content;
  }
  /* Phones area */
  .phones-area {
    position: absolute;
    right: 80px; top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .phone-wrap {
    display: flex; flex-direction: column; align-items: center;
  }
  .phone {
    width: 200px; height: 400px;
    border: 2px solid #243650;
    border-radius: 32px;
    background: #0A1520;
    position: relative;
    overflow: hidden;
  }
  .phone-notch {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    width: 60px; height: 16px;
    background: #0A1520;
    border: 1px solid #243650;
    border-radius: 8px;
    z-index: 10;
  }
  .phone-home {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    width: 40px; height: 3px;
    background: #243650;
    border-radius: 2px;
    z-index: 10;
  }
  .phone-screen {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    padding: 40px 12px 24px;
    display: flex; flex-direction: column;
    gap: 8px;
  }
  /* Phone 1 styles */
  .avatar-placeholder {
    width: 100%; height: 110px;
    background: linear-gradient(135deg, #00D4C8, #7C3AED);
    border-radius: 10px;
    opacity: 0.7;
  }
  .pname {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px; font-weight: 700;
    color: #fff;
  }
  .pmuted {
    font-family: 'Inter', sans-serif;
    font-size: 10px; color: #4A6080;
  }
  .badge-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge {
    padding: 3px 8px;
    border-radius: 100px;
    font-size: 9px;
    font-family: 'Space Grotesk', sans-serif;
    color: #00D4C8;
    border: 1px solid #00D4C8;
  }
  .btn-row { display: flex; gap: 6px; margin-top: 4px; }
  .btn-pass {
    flex: 1; padding: 7px 0; background: #111E2E;
    border-radius: 8px; text-align: center;
    font-size: 10px; font-family: 'Space Grotesk', sans-serif;
    color: #7A9CC0; font-weight: 600;
  }
  .btn-match {
    flex: 1; padding: 7px 0;
    background: linear-gradient(135deg, #00D4C8, #7C3AED);
    border-radius: 8px; text-align: center;
    font-size: 10px; font-family: 'Space Grotesk', sans-serif;
    color: #fff; font-weight: 600;
  }
  /* Phone 2 styles */
  .caps-teal {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px; color: #00D4C8;
    letter-spacing: 0.2em; text-transform: uppercase;
  }
  .p2-header {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px; font-weight: 700; color: #fff;
  }
  .player-card {
    background: linear-gradient(135deg, rgba(0,212,200,0.15), rgba(124,58,237,0.15));
    border: 1px solid #243650;
    border-radius: 10px;
    padding: 10px;
  }
  .skill-bar-bg {
    width: 100%; height: 4px;
    background: #1A2C42; border-radius: 2px; margin-top: 6px;
  }
  .skill-bar-fill {
    width: 70%; height: 4px;
    background: #00D4C8; border-radius: 2px;
  }
  /* Phone 3 styles */
  .avatar-circle {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00D4C8, #7C3AED);
    margin: 0 auto;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .stats-row { display: flex; justify-content: center; gap: 16px; margin-top: 6px; }
  .stat-val {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px; font-weight: 700; color: #00D4C8;
    text-align: center;
  }
  .stat-lbl {
    font-family: 'Inter', sans-serif;
    font-size: 9px; color: #4A6080; text-align: center;
  }
  .photo-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr; gap: 4px; margin-top: 8px;
  }
  .photo-cell {
    height: 36px; background: #1A2C42; border-radius: 4px;
  }
  .slide-num {
    position: absolute; bottom: 16px; right: 80px;
    font-size: 11px; letter-spacing: 0.3em;
    color: #4A6080; font-family: 'Space Grotesk', sans-serif;
    text-transform: uppercase;
  }
  .bottom-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 4px; background: linear-gradient(90deg, #00D4C8, #7C3AED);
  }
</style>
</head>
<body>
<div class="slide">
  <div class="glow-tl"></div>
  <div class="glow-tr"></div>

  <!-- Left text -->
  <div class="left-text">
    <span class="h-white">Product</span>
    <span class="h-gradient">Mockups</span>
    <p class="subtitle">Designed for padel players.<br>Built for connection.</p>
    <div class="stat-pills">
      <span class="stat-pill">3 Core Screens</span>
      <span class="stat-pill">Dark-First Design</span>
      <span class="stat-pill">Motion Ready</span>
    </div>
  </div>

  <!-- Phones -->
  <div class="phones-area">
    <!-- Phone 1 — rotated left -->
    <div class="phone-wrap" style="transform: translateX(-20px) rotate(-5deg);">
      <div class="phone">
        <div class="phone-notch"></div>
        <div class="phone-screen">
          <div class="avatar-placeholder"></div>
          <span class="pname">Alex M.</span>
          <span class="pmuted">Madrid · Intermediate</span>
          <div class="badge-row">
            <span class="badge">4.2★</span>
            <span class="badge">5 Matches</span>
          </div>
          <div class="btn-row">
            <div class="btn-pass">Pass</div>
            <div class="btn-match">Match 🎾</div>
          </div>
        </div>
        <div class="phone-home"></div>
      </div>
    </div>

    <!-- Phone 2 — center hero -->
    <div class="phone-wrap" style="transform: translateY(-20px);">
      <div class="phone" style="border-color: #00D4C8; box-shadow: 0 0 40px rgba(0,212,200,0.2);">
        <div class="phone-notch"></div>
        <div class="phone-screen">
          <span class="caps-teal">Find Your</span>
          <span class="p2-header">Rally Partner</span>
          <div class="player-card">
            <div style="width:100%;height:80px;background:linear-gradient(135deg,rgba(0,212,200,0.3),rgba(124,58,237,0.3));border-radius:8px;margin-bottom:8px;"></div>
            <span class="pname" style="font-size:13px;">Sarah K.</span>
            <span class="pmuted">London · Advanced</span>
            <div class="skill-bar-bg"><div class="skill-bar-fill"></div></div>
          </div>
          <div class="btn-row" style="margin-top:6px;">
            <div class="btn-match" style="flex:1;">Connect 🎾</div>
          </div>
        </div>
        <div class="phone-home"></div>
      </div>
    </div>

    <!-- Phone 3 — rotated right -->
    <div class="phone-wrap" style="transform: translateX(20px) rotate(5deg);">
      <div class="phone">
        <div class="phone-notch"></div>
        <div class="phone-screen">
          <div class="avatar-circle">🎾</div>
          <span class="pname" style="text-align:center;">Carlos V.</span>
          <div class="stats-row">
            <div>
              <div class="stat-val">24</div>
              <div class="stat-lbl">Games</div>
            </div>
            <div>
              <div class="stat-val">18</div>
              <div class="stat-lbl">Wins</div>
            </div>
            <div>
              <div class="stat-val">4.8</div>
              <div class="stat-lbl">Rating</div>
            </div>
          </div>
          <div class="photo-grid">
            <div class="photo-cell"></div>
            <div class="photo-cell" style="background:#1A3050;"></div>
            <div class="photo-cell"></div>
            <div class="photo-cell" style="background:#1A3050;"></div>
            <div class="photo-cell"></div>
            <div class="photo-cell" style="background:#1A3050;"></div>
          </div>
        </div>
        <div class="phone-home"></div>
      </div>
    </div>
  </div>

  <span class="slide-num">06 / 10</span>
  <div class="bottom-bar"></div>
</div>
</body>
</html>
