<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Volpair — Slide 04 Icon System</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px; height: 1080px;
    background: #0A1520;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .slide {
    width: 1920px; height: 1080px;
    background: #0A1520;
    position: relative; overflow: hidden;
  }
  .glow1 {
    position: absolute; top: -100px; left: -100px;
    width: 700px; height: 600px;
    background: radial-gradient(ellipse, rgba(0,212,200,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .glow2 {
    position: absolute; bottom: -100px; right: -100px;
    width: 700px; height: 600px;
    background: radial-gradient(ellipse, rgba(124,58,237,0.1) 0%, transparent 70%);
    pointer-events: none;
  }
  .title-area {
    position: absolute; top: 56px; left: 80px;
    display: flex; align-items: baseline; gap: 16px;
  }
  .title-white {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: 52px; color: #fff;
  }
  .title-gradient {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: 52px;
    background: linear-gradient(135deg, #00D4C8, #7C3AED);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .subtitle {
    position: absolute; top: 130px; left: 80px;
    font-family: 'Inter', sans-serif;
    font-size: 16px; color: #4A6080;
  }
  .icon-grid {
    position: absolute;
    top: 170px; left: 80px; right: 80px;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(2, 190px);
    gap: 16px;
  }
  .icon-card {
    background: #0D1B2A;
    border: 1px solid #1A2C42;
    border-radius: 16px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
    transition: border-color 0.2s;
  }
  .icon-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px;
    color: #4A6080;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-align: center;
  }
  .slide-num {
    position: absolute; bottom: 16px; right: 80px;
    font-size: 11px; letter-spacing: 0.3em;
    color: #4A6080; font-family: 'Space Grotesk', sans-serif;
    text-transform: uppercase;
  }
  .bottom-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 4px; background: linear-gradient(90deg, #00D4C8, #7C3AED);
  }
</style>
</head>
<body>
<div class="slide">
  <div class="glow1"></div>
  <div class="glow2"></div>

  <div class="title-area">
    <span class="title-white">Icon</span>
    <span class="title-gradient">System</span>
  </div>
  <span class="subtitle">Custom padel-native iconography</span>

  <div class="icon-grid">
    <!-- 1. Racquet -->
    <div class="icon-card">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="#00D4C8" stroke-width="1.5" stroke-linecap="round">
        <circle cx="15" cy="14" r="10"/>
        <line x1="15" y1="5" x2="15" y2="23" stroke="rgba(0,212,200,0.4)"/>
        <line x1="6" y1="14" x2="24" y2="14" stroke="rgba(0,212,200,0.4)"/>
        <line x1="22" y1="22" x2="30" y2="32"/>
        <rect x="27" y="28" width="5" height="6" rx="2" transform="rotate(-45 27 28)"/>
      </svg>
      <span class="icon-name">Racquet</span>
    </div>
    <!-- 2. Heart -->
    <div class="icon-card">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="#00D4C8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 30 C18 30 4 21 4 12 C4 7.5 7.5 4 12 4 C14.5 4 18 6.5 18 6.5 C18 6.5 21.5 4 24 4 C28.5 4 32 7.5 32 12 C32 21 18 30 18 30Z"/>
      </svg>
      <span class="icon-name">Heart</span>
    </div>
    <!-- 3. Location pin -->
    <div class="icon-card">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="#00D4C8" stroke-width="1.5" stroke-linecap="round">
        <path d="M18 32 C18 32 6 22 6 14 C6 7.4 11.4 2 18 2 C24.6 2 30 7.4 30 14 C30 22 18 32 18 32Z"/>
        <circle cx="18" cy="14" r="4"/>
      </svg>
      <span class="icon-name">Location</span>
    </div>
    <!-- 4. Trophy -->
    <div class="icon-card">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="#00D4C8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 4 H26 V18 C26 24 22 28 18 28 C14 28 10 24 10 18 Z"/>
        <path d="M10 8 H5 C5 8 5 16 10 18"/>
        <path d="M26 8 H31 C31 8 31 16 26 18"/>
        <line x1="18" y1="28" x2="18" y2="32"/>
        <line x1="12" y1="32" x2="24" y2="32"/>
      </svg>
      <span class="icon-name">Trophy</span>
    </div>
    <!-- 5. Chat bubble -->
    <div class="icon-card">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="#00D4C8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 6 H32 C33.1 6 34 6.9 34 8 V22 C34 23.1 33.1 24 32 24 H12 L4 32 V8 C4 6.9 4.9 6 6 6Z" transform="translate(-1,0)"/>
        <line x1="10" y1="13" x2="26" y2="13"/>
        <line x1="10" y1="18" x2="20" y2="18"/>
      </svg>
      <span class="icon-name">Chat</span>
    </div>
    <!-- 6. Flame -->
    <div class="icon-card">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="#00D4C8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 34 C10 34 5 28 5 22 C5 16 9 13 12 10 C12 14 14 16 16 16 C14 12 15 6 18 2 C18 2 22 8 22 14 C24 12 24 8 23 6 C26 9 31 14 31 22 C31 28 26 34 18 34Z"/>
        <circle cx="18" cy="26" r="3"/>
      </svg>
      <span class="icon-name">Flame</span>
    </div>
    <!-- 7. Star -->
    <div class="icon-card">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="#00D4C8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 3 L21.8 13.4 H33 L23.6 19.6 L27.4 30 L18 23.8 L8.6 30 L12.4 19.6 L3 13.4 H14.2 Z"/>
      </svg>
      <span class="icon-name">Star</span>
    </div>
    <!-- 8. Calendar -->
    <div class="icon-card">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="#00D4C8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="6" width="28" height="26" rx="3"/>
        <line x1="4" y1="14" x2="32" y2="14"/>
        <line x1="12" y1="4" x2="12" y2="10"/>
        <line x1="24" y1="4" x2="24" y2="10"/>
        <rect x="10" y="19" width="4" height="4" rx="1"/>
        <rect x="16" y="19" width="4" height="4" rx="1"/>
        <rect x="22" y="19" width="4" height="4" rx="1"/>
        <rect x="10" y="25" width="4" height="4" rx="1"/>
        <rect x="16" y="25" width="4" height="4" rx="1"/>
      </svg>
      <span class="icon-name">Calendar</span>
    </div>
    <!-- 9. Clock -->
    <div class="icon-card">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="#00D4C8" stroke-width="1.5" stroke-linecap="round">
        <circle cx="18" cy="18" r="14"/>
        <line x1="18" y1="9" x2="18" y2="18"/>
        <line x1="18" y1="18" x2="25" y2="22"/>
        <circle cx="18" cy="18" r="1.5" fill="#00D4C8"/>
      </svg>
      <span class="icon-name">Clock</span>
    </div>
    <!-- 10. Users -->
    <div class="icon-card">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="#00D4C8" stroke-width="1.5" stroke-linecap="round">
        <circle cx="13" cy="13" r="6"/>
        <path d="M2 32 C2 26 7 22 13 22"/>
        <circle cx="25" cy="13" r="5"/>
        <path d="M23 22 C29 22 34 26 34 32"/>
        <path d="M13 22 C19 22 24 26 24 32 H2"/>
      </svg>
      <span class="icon-name">Users</span>
    </div>
    <!-- 11. Scoreboard -->
    <div class="icon-card">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="#00D4C8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="5" width="30" height="26" rx="3"/>
        <line x1="3" y1="14" x2="33" y2="14"/>
        <line x1="3" y1="22" x2="33" y2="22"/>
        <line x1="12" y1="5" x2="12" y2="31"/>
        <line x1="24" y1="5" x2="24" y2="31"/>
        <text x="6" y="11" font-size="5" fill="#00D4C8" stroke="none" font-family="Space Grotesk">4</text>
        <text x="16" y="11" font-size="5" fill="#00D4C8" stroke="none" font-family="Space Grotesk">2</text>
        <text x="27" y="11" font-size="5" fill="#00D4C8" stroke="none" font-family="Space Grotesk">6</text>
        <text x="6" y="20" font-size="5" fill="#4A6080" stroke="none" font-family="Space Grotesk">3</text>
        <text x="16" y="20" font-size="5" fill="#4A6080" stroke="none" font-family="Space Grotesk">4</text>
        <text x="27" y="20" font-size="5" fill="#4A6080" stroke="none" font-family="Space Grotesk">2</text>
      </svg>
      <span class="icon-name">Scoreboard</span>
    </div>
    <!-- 12. Padel court -->
    <div class="icon-card">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="#00D4C8" stroke-width="1.5" stroke-linecap="round">
        <rect x="3" y="6" width="30" height="24" rx="2"/>
        <line x1="18" y1="6" x2="18" y2="30"/>
        <line x1="3" y1="13" x2="18" y2="13"/>
        <line x1="18" y1="23" x2="33" y2="23"/>
        <line x1="3" y1="18" x2="33" y2="18" stroke-width="2"/>
      </svg>
      <span class="icon-name">Court</span>
    </div>
    <!-- 13. Gear -->
    <div class="icon-card">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="#00D4C8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="18" cy="18" r="5"/>
        <path d="M18 4 L19.5 8 C21 8 22.5 8.5 23.5 9.5 L27.5 8.5 L30 12.5 L27 15 C27.2 16 27.2 17 27 18 L30 20.5 L27.5 24.5 L23.5 23.5 C22.5 24.5 21 25 19.5 25.2 L18 29 L16.5 25.2 C15 25 13.5 24.5 12.5 23.5 L8.5 24.5 L6 20.5 L9 18 C8.8 17 8.8 16 9 15 L6 12.5 L8.5 8.5 L12.5 9.5 C13.5 8.5 15 8 16.5 7.8 Z"/>
      </svg>
      <span class="icon-name">Settings</span>
    </div>
    <!-- 14. Bell -->
    <div class="icon-card">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="#00D4C8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 4 C18 4 10 7 10 18 L10 26 H26 V18 C26 7 18 4 18 4Z"/>
        <line x1="6" y1="26" x2="30" y2="26"/>
        <path d="M15 28 C15 30 21 30 21 28"/>
      </svg>
      <span class="icon-name">Bell</span>
    </div>
    <!-- 15. Camera -->
    <div class="icon-card">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="#00D4C8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="30" height="20" rx="3"/>
        <path d="M13 11 L15 7 H21 L23 11"/>
        <circle cx="18" cy="21" r="5"/>
        <circle cx="28" cy="16" r="1.5" fill="#00D4C8" stroke="none"/>
      </svg>
      <span class="icon-name">Camera</span>
    </div>
    <!-- 16. Padel ball -->
    <div class="icon-card">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" stroke="#00D4C8" stroke-width="1.5" stroke-linecap="round">
        <circle cx="18" cy="18" r="14"/>
        <path d="M6 11 C10 11 14 14 14 18 C14 22 10 25 6 25" fill="none"/>
        <path d="M30 11 C26 11 22 14 22 18 C22 22 26 25 30 25" fill="none"/>
      </svg>
      <span class="icon-name">Ball</span>
    </div>
  </div>

  <span class="slide-num">04 / 10</span>
  <div class="bottom-bar"></div>
</div>
</body>
</html>
