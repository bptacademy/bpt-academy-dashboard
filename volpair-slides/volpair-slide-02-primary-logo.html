<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Volpair — Slide 02 Primary Logo</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px; height: 1080px;
    background: #0A1520;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }
  .slide {
    width: 1920px; height: 1080px;
    background: #0A1520;
    position: relative; overflow: hidden;
  }
  .glow-teal {
    position: absolute; top: -100px; left: 50%; transform: translateX(-50%);
    width: 800px; height: 600px;
    background: radial-gradient(ellipse, rgba(0,212,200,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .glow-purple {
    position: absolute; bottom: 0; right: 0;
    width: 600px; height: 600px;
    background: radial-gradient(ellipse, rgba(124,58,237,0.1) 0%, transparent 70%);
    pointer-events: none;
  }
  .slide-label {
    position: absolute; top: 60px; left: 80px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: #4A6080;
    text-transform: uppercase;
  }
  .title-area {
    position: absolute; top: 80px; left: 0; right: 0;
    text-align: center;
  }
  .title-white {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 52px;
    color: #fff;
    display: block;
    line-height: 1.1;
  }
  .title-gradient {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 52px;
    background: linear-gradient(135deg, #00D4C8, #7C3AED);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: block;
    line-height: 1.1;
  }
  .cards-row {
    position: absolute;
    top: 230px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 40px;
    align-items: flex-start;
  }
  .card-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .logo-card {
    width: 380px; height: 320px;
    border: 1px solid #243650;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .card-dark { background: #0D1B2A; }
  .card-gradient { background: linear-gradient(135deg, #00D4C8, #7C3AED); }
  .wordmark-gradient {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 800;
    font-size: 56px;
    background: linear-gradient(135deg, #00D4C8, #7C3AED);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.05em;
  }
  .slogan-caps {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    letter-spacing: 0.6em;
    color: #7A9CC0;
    text-transform: uppercase;
  }
  .wordmark-white {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 800;
    font-size: 40px;
    color: #fff;
    letter-spacing: 0.05em;
  }
  .lockup-row {
    display: flex; align-items: center; gap: 16px;
  }
  .card-c-inner {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .wordmark-white-sm {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 800;
    font-size: 36px;
    color: #fff;
    letter-spacing: 0.06em;
  }
  .padel-dating {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.8);
    text-transform: uppercase;
  }
  .card-caption {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    color: #4A6080;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  /* Clear space section */
  .clearspace {
    position: absolute;
    bottom: 80px;
    left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .clearspace-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: #4A6080;
    text-transform: uppercase;
  }
  .clearspace-box {
    display: flex;
    align-items: center;
    gap: 24px;
    border: 1px dashed #243650;
    padding: 16px 32px;
    border-radius: 12px;
  }
  .arrow-annotation {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    color: #7A9CC0;
  }
  .x-annotation {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: #00D4C8;
  }
  .slide-num {
    position: absolute;
    bottom: 16px; right: 80px;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: #4A6080;
    font-family: 'Space Grotesk', sans-serif;
    text-transform: uppercase;
  }
  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #00D4C8, #7C3AED);
  }
</style>
</head>
<body>
<div class="slide">
  <div class="glow-teal"></div>
  <div class="glow-purple"></div>

  <span class="slide-label">02 — Primary Logo</span>

  <div class="title-area">
    <span class="title-white">Primary Logo</span>
    <span class="title-gradient">Presentation</span>
  </div>

  <div class="cards-row">
    <!-- Card A -->
    <div class="card-wrap">
      <div class="logo-card card-dark">
        <span class="wordmark-gradient">VOLPAIR</span>
        <span class="slogan-caps">Play · Match · Connect</span>
      </div>
      <span class="card-caption">A — Primary Wordmark</span>
    </div>

    <!-- Card B -->
    <div class="card-wrap">
      <div class="logo-card card-dark">
        <div class="lockup-row">
          <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="lgI2b" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#00D4C8"/>
                <stop offset="100%" stop-color="#7C3AED"/>
              </linearGradient>
            </defs>
            <circle cx="26" cy="22" r="18" fill="url(#lgI2b)"/>
            <line x1="26" y1="5" x2="26" y2="39" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
            <line x1="9" y1="22" x2="43" y2="22" stroke="rgba(255,255,255,0.3)" stroke-width="1.2"/>
            <path d="M26 30 C26 30 18 25 18 20 C18 17 20 15 22 15 C24 15 26 17 26 17 C26 17 28 15 30 15 C32 15 34 17 34 20 C34 25 26 30 26 30Z" fill="rgba(255,255,255,0.92)"/>
            <rect x="22" y="38" width="8" height="12" rx="3" fill="url(#lgI2b)"/>
            <rect x="20" y="36" width="12" height="4" rx="2" fill="url(#lgI2b)"/>
          </svg>
          <span class="wordmark-white">VOLPAIR</span>
        </div>
      </div>
      <span class="card-caption">B — Horizontal Lockup</span>
    </div>

    <!-- Card C -->
    <div class="card-wrap">
      <div class="logo-card card-gradient">
        <div class="card-c-inner">
          <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="26" cy="22" r="18" fill="rgba(255,255,255,0.25)"/>
            <line x1="26" y1="5" x2="26" y2="39" stroke="rgba(255,255,255,0.5)" stroke-width="1.2"/>
            <line x1="9" y1="22" x2="43" y2="22" stroke="rgba(255,255,255,0.5)" stroke-width="1.2"/>
            <path d="M26 30 C26 30 18 25 18 20 C18 17 20 15 22 15 C24 15 26 17 26 17 C26 17 28 15 30 15 C32 15 34 17 34 20 C34 25 26 30 26 30Z" fill="rgba(255,255,255,0.95)"/>
            <rect x="22" y="38" width="8" height="12" rx="3" fill="rgba(255,255,255,0.7)"/>
            <rect x="20" y="36" width="12" height="4" rx="2" fill="rgba(255,255,255,0.7)"/>
          </svg>
          <span class="wordmark-white-sm">VOLPAIR</span>
          <span class="padel-dating">Padel Dating</span>
        </div>
      </div>
      <span class="card-caption">C — App Icon / Stacked</span>
    </div>
  </div>

  <!-- Clear space rule -->
  <div class="clearspace">
    <span class="clearspace-label">Clear Space Rule</span>
    <div class="clearspace-box">
      <span class="arrow-annotation">← X</span>
      <div style="border: 1px dashed #243650; padding: 12px 16px; border-radius: 8px; display:flex; align-items:center; gap:10px;">
        <svg width="32" height="32" viewBox="0 0 52 52" fill="none">
          <defs><linearGradient id="lgIcs" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#00D4C8"/><stop offset="100%" stop-color="#7C3AED"/></linearGradient></defs>
          <circle cx="26" cy="22" r="18" fill="url(#lgIcs)"/>
          <path d="M26 30 C26 30 18 25 18 20 C18 17 20 15 22 15 C24 15 26 17 26 17 C26 17 28 15 30 15 C32 15 34 17 34 20 C34 25 26 30 26 30Z" fill="rgba(255,255,255,0.92)"/>
          <rect x="22" y="38" width="8" height="12" rx="3" fill="url(#lgIcs)"/>
          <rect x="20" y="36" width="12" height="4" rx="2" fill="url(#lgIcs)"/>
        </svg>
      </div>
      <span class="arrow-annotation">X →</span>
      <span class="x-annotation">X = Icon height · Minimum clear space on all sides</span>
    </div>
  </div>

  <span class="slide-num">02 / 10</span>
  <div class="bottom-bar"></div>
</div>
</body>
</html>
