<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Redirecting — BPT Academy</title>
  <style>
    body { margin: 0; background: #0B1628; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, sans-serif; }
    .box { text-align: center; padding: 40px 24px; }
    .logo { font-size: 22px; font-weight: 800; color: #F0F6FC; letter-spacing: 2px; margin-bottom: 8px; }
    .sub { font-size: 12px; color: rgba(255,255,255,0.35); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 32px; }
    .msg { font-size: 16px; color: rgba(255,255,255,0.7); margin-bottom: 8px; }
    .hint { font-size: 13px; color: rgba(255,255,255,0.35); margin-top: 24px; line-height: 1.6; }
    a { color: #3B82F6; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">BPT ACADEMY</div>
    <div class="sub">British Padel Academy</div>
    <div class="msg">Opening the app…</div>
    <div class="hint" id="hint"></div>
  </div>
  <script>
    var hash = window.location.hash.substring(1);
    var params = new URLSearchParams(hash);
    var accessToken = params.get('access_token');
    var refreshToken = params.get('refresh_token');
    var type = params.get('type');

    var hintEl = document.getElementById('hint');

    if (type === 'recovery' && accessToken) {
      // Production deep link (installed app)
      var productionLink = 'bptacademy://reset-password#' + hash;
      // Expo Go tunnel link (dev/testing)
      var expoLink = 'exp://bpt-academy.ngrok.app/--/reset-password#' + hash;

      // Try production app first, fall back shown as manual links
      hintEl.innerHTML =
        'If the app doesn\'t open automatically:<br><br>' +
        '<a href="' + productionLink + '">Open in BPT Academy app</a><br><br>' +
        '<a href="' + expoLink + '">Open in Expo Go (testing)</a>';

      // Attempt to open production app
      window.location.href = productionLink;
    } else {
      document.querySelector('.msg').textContent = 'Invalid or expired reset link.';
      hintEl.textContent = 'Please request a new password reset from the app.';
    }
  </script>
</body>
</html>
