<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Redirecting — BPT Academy</title>
  <style>
    body { margin: 0; background: #0B1628; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, sans-serif; }
    .box { text-align: center; padding: 40px 24px; }
    .logo { font-size: 22px; font-weight: 800; color: #F0F6FC; letter-spacing: 2px; margin-bottom: 8px; }
    .sub { font-size: 12px; color: rgba(255,255,255,0.35); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 32px; }
    .msg { font-size: 16px; color: rgba(255,255,255,0.7); margin-bottom: 8px; }
    .hint { font-size: 13px; color: rgba(255,255,255,0.35); margin-top: 24px; }
    a { color: #3B82F6; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">BPT ACADEMY</div>
    <div class="sub">British Padel Academy</div>
    <div class="msg">Opening the app…</div>
    <div class="hint">If the app doesn't open, <a href="#" id="manual">tap here</a>.</div>
  </div>
  <script>
    // Supabase puts tokens in the URL hash: #access_token=...&type=recovery
    var hash = window.location.hash.substring(1);
    var params = new URLSearchParams(hash);
    var accessToken = params.get('access_token');
    var refreshToken = params.get('refresh_token');
    var type = params.get('type');

    if (type === 'recovery' && accessToken) {
      var deepLink = 'bptacademy://reset-password#' + hash;
      document.getElementById('manual').href = deepLink;
      // Attempt to open the app
      window.location.href = deepLink;
    } else {
      document.querySelector('.msg').textContent = 'Invalid or expired link.';
    }
  </script>
</body>
</html>
